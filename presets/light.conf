[General]
# Background color
background="#FFFFFF"


# Text color #

# Samaritan title and most of the other things
primaryText="#110a0a" 
# Stats values: hostname, cpu, kernel, ...
secondaryText="#241F1F" 
# Stats title: CORE, NETWORK, ... also previews
mutedText="#3E3B3B"
# System status, Uptime, System Profile. 
headerText="#271D1D"
# triangle and caps locks  
triangleColor="#d92b2b" 
accessGranted="#00FF00"
accessDenied="#FF0000"
# Loading properties 
bootText="#363333"
# System Online 
onlineText="#000000" 

# Font family
mainFont=monoMMM_5
headerFont=MagdaCleanMono
samaritanFont=MagdaCleanMono

# Password field
passwordFieldWidth=220
passwordFieldHeight=28
passwordFieldFontSize=12
passwordFieldLetterSpacing=1
# Leave empty for asterisk *
passwordCharacter=
showPasswordButton=false

# UI Offset
passwordFieldOffsetX=0
passwordFieldOffsetY=50

# Selectors
selectorSpacing=10
selectorFontSize=14
selectorArrowFontSize=17
selectorHeight=35
selectorArrowWidth=10
selectorRadius=10

# Selector preview
# See line 905 in Main.qml to enable session preview (disabled it by default)
showSelectorPreview=true
selectorPreviewFontSize=13
selectorPreviewMargin=25

# Animation duration (milliseconds)
animationDuration=200
# you probably wont see it if its below 1000
fadeInDuration=1000

# Spacing
elementSpacing=15

# Global opacity for all elements
elementOpacity=1.0

# Cursor
showCursor=false

# Help tips
showHelpTips=false
helpTipsFontSize=11

# Caps Lock indicator
showCapsLockIndicator=true
capsLockIndicatorFontSize=12

# Password validation
allowEmptyPassword=false
# Clear password field on login error
clearPasswordOnError=false


